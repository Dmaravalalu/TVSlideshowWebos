<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slideshow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="stage" id="stage">
    <div class="layer" id="layerA"></div>
    <div class="layer" id="layerB"></div>
    <!-- A hidden preloader for the next media item. -->
    <div style="position:absolute; left:-99999px; width:1px; height:1px; overflow:hidden;" id="preloader" aria-hidden="true"></div>
    <div id="folder"></div>
    <div id="clock"></div>
    <div id="toast"></div>
    <div id="overlay">Connecting ...</div>
  </div>

  <script src="/remote.js"></script>
  <script src="/app.js"></script>
</body>
</html>
